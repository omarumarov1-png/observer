<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nablyudatel — Election Observer Russian</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

<div id="app" class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="26" height="26"><rect x="6" y="14" width="20" height="14" rx="1" fill="none" stroke="var(--navy)" stroke-width="2"/><path d="M16 14V6M16 6l-5 4M16 6l5 4" stroke="var(--stamp)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </span>
      <div>
        <div class="brand-name">Nablyudatel</div>
        <div class="brand-sub">Election Observer RU</div>
      </div>
    </div>
    <div class="stats" id="topStats">
      <div class="stat stat-streak" title="Day streak">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M12 2c1 4-3 5-3 9a3 3 0 006 0c0-1-1-2-1-2 2 1 3 3 3 5a5 5 0 11-10 0c0-5 4-7 5-12z" fill="var(--gold)"/></svg>
        <span id="streakCount">0</span>
      </div>
      <div class="stat stat-xp" title="Total experience">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M12 2l2.6 6.6L21 10l-5.2 4.3L17.4 21 12 17.3 6.6 21l1.6-6.7L3 10l6.4-1.4z" fill="var(--stamp)"/></svg>
        <span id="xpCount">0</span>
      </div>
      <button class="stat stat-words" id="wordsStat" title="Your term bank — click to view">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M5 3h11a3 3 0 013 3v15l-3-2-3 2-3-2-3 2-3-2-3 2V6a3 3 0 013-3z" fill="none" stroke="var(--navy)" stroke-width="1.6"/><path d="M8 8h8M8 12h6" stroke="var(--navy)" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span id="wordsCount">0</span>
      </button>
      <button class="stat stat-practice hidden" id="practiceStat" title="Terms available for practice — click to practice now">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M4 12a8 8 0 0114-5.3M20 12a8 8 0 01-14 5.3" fill="none" stroke="var(--navy)" stroke-width="1.6" stroke-linecap="round"/><path d="M18 4v3.5h-3.5M6 20v-3.5h3.5" fill="none" stroke="var(--navy)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="practiceCount">0</span>
      </button>
      <button class="stat stat-mistakes hidden" id="mistakesStat" title="Mistakes waiting to be reviewed — click to practice them now">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="var(--stamp)" stroke-width="1.6"/><path d="M9 9l6 6M15 9l-6 6" stroke="var(--stamp)" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span id="mistakesCount">0</span>
      </button>
      <button class="direction-toggle" id="directionToggle" title="Switch practice direction" aria-label="Switch practice direction">RU → EN</button>
      <button class="icon-btn theme-toggle" id="themeToggle" title="Switch between light and dark" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><circle cx="12" cy="12" r="4.5" fill="none" stroke="var(--gold)" stroke-width="1.6"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8L6 18M18 6l1.8-1.8" stroke="var(--gold)" stroke-width="1.6" stroke-linecap="round"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z" fill="none" stroke="var(--gold)" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn sound-toggle" id="soundToggle" title="Mute or unmute sound effects" aria-label="Toggle sound effects">
        <svg class="icon-on" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="var(--gold)"/><path d="M16.5 9a3.5 3.5 0 010 6M19 6.5a7 7 0 010 11" fill="none" stroke="var(--gold)" stroke-width="1.6" stroke-linecap="round"/></svg>
        <svg class="icon-muted" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="var(--ink-soft)"/><path d="M16 9l5 6M21 9l-5 6" stroke="var(--ink-soft)" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <main id="screen" class="screen"></main>
</div>

<div class="modal hidden" id="hoardModal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Term Bank</h3>
      <button class="modal-close" id="hoardClose" aria-label="Close">&times;</button>
    </div>
    <p class="modal-sub">Every term you've answered correctly, collected here.</p>
    <div class="hoard-list" id="hoardList"></div>
  </div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
